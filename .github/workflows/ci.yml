name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Headless GL so MuJoCo can render the perception crops; rendering-dependent tests
      # skip gracefully (the `_rendering_available()` guards) if EGL can't initialize.
      - name: Install headless GL libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libglfw3 libosmesa6
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run the test suite
        env:
          MUJOCO_GL: egl
        run: pytest -q
